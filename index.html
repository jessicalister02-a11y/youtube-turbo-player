<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Turbo Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>YouTube Turbo Player</h1>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Paste YouTube URL here (e.g., https://www.youtube.com/watch?v=...)">
            <button onclick="loadVideo()">Load Video</button>
        </div>

        <div id="player-container">
            <div id="player"></div>
        </div>

        <div class="controls">
            <label for="speedRange">Playback Speed: <span id="speedValue">1.0</span>x</label>
            <input type="range" id="speedRange" min="0.25" max="8" step="0.05" value="1">
            
            <div class="presets">
                <button onclick="setSpeed(1)">Normal</button>
                <button onclick="setSpeed(2.25)">2.25x</button>
                <button onclick="setSpeed(2.5)">2.5x</button>
                <button onclick="setSpeed(3)">3x</button>
                <button onclick="setSpeed(3.5)">3.5x</button>
                <button onclick="setSpeed(4)">4x</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
